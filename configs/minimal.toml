profile = "minimal"

[backend]
name = "essentia"

[features]
families = ["spectral", "temporal", "metadata"]
enabled = [
  "centroid",
  "rolloff",
  "flux",
  "energy",
  "zcr",
  "rms",
  "duration",
  "silence_ratio",
  "active_ratio",
]
frame_level = false

[aggregation]
statistics = ["mean"]

[performance]
workers = 1
