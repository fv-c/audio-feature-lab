profile = "default"

[backend]
name = "essentia"

[features]
families = ["spectral", "temporal", "rhythm", "tonal", "dynamics", "metadata"]
enabled = [
  "centroid",
  "spread",
  "rolloff",
  "flux",
  "flatness",
  "entropy",
  "hfc",
  "mfcc",
  "zcr",
  "rms",
  "peak",
  "dynamic_range",
  "tempo",
  "beat_period",
  "onset_strength",
  "hpcp",
  "chroma",
  "key_strength",
  "tuning_frequency",
  "loudness",
  "dynamic_complexity",
  "duration",
  "silence_ratio",
  "active_ratio",
]
frame_level = false

[aggregation]
statistics = ["mean"]

[performance]
workers = 1
